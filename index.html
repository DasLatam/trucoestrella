<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>TrucoEstrella</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #004d40; color: white; text-align: center; }
    h1, h2 { color: #b2dfdb; text-shadow: 1px 1px 2px black; }
    .mesa {
      background-color: #00695c; border: 2px solid #00796b; border-radius: 10px;
      padding: 10px; margin: 10px auto; display: flex; flex-direction: column;
      gap: 15px; width: 350px;
    }
    .fila-jugador { display: flex; justify-content: space-around; gap: 10px; }
    .slot-carta {
      width: 85px; height: 125px; border: 2px dashed rgba(255,255,255,0.2);
      border-radius: 8px; position: relative;
    }
    .carta {
      background-color: white; color: black; border: 2px solid black; border-radius: 8px;
      width: 100%; height: 100%; display: flex; flex-direction: column;
      justify-content: space-between; padding: 5px; font-size: 20px; font-weight: bold;
      box-sizing: border-box; transition: all 0.3s ease;
      box-shadow: 3px 3px 5px rgba(0,0,0,0.3); position: absolute; top: 0; left: 0;
    }
    .mano-jugador .carta { position: static; /* Las cartas en la mano no son absolutas */ }
    .mano-jugador .carta:not([disabled]) { cursor: pointer; }
    .mano-jugador .carta:not([disabled]):hover { transform: translateY(-10px) scale(1.05); border-color: #ffab00; }
    .carta[disabled] { cursor: not-allowed; opacity: 0.8; }
    .carta.palo-oros, .carta.palo-bastos { color: #d32f2f; }
    #info-juego { font-size: 1.2em; min-height: 40px; margin: 15px 0; color: #ffcc80; font-weight: bold; }
    #controles-juego button {
      padding: 10px 20px; font-size: 1em; cursor: pointer; border-radius: 5px;
      border: none; background-color: #ffab00; color: black; font-weight: bold;
      margin: 5px; display: none; /* Ocultos por defecto */
    }
    /* NUEVO: Estilos para la carta ganadora y perdedora */
    .carta-perdedora { z-index: 1; }
    .carta-ganadora {
        z-index: 2;
        transform: scale(1.05);
        border: 3px solid #ffeb3b;
        box-shadow: 0 0 15px #ffeb3b;
    }
  </style>
</head>
<body>
  <h1>TrucoEstrella</h1>
  <div id="info-juego"></div>

  <div class="mesa" id="mesa">
    <div class="fila-jugador" id="fila-cpu">
      <div class="slot-carta" id="slot-cpu-1"></div>
      <div class="slot-carta" id="slot-cpu-2"></div>
      <div class="slot-carta" id="slot-cpu-3"></div>
    </div>
    <div class="fila-jugador" id="fila-humano">
      <div class="slot-carta" id="slot-humano-1"></div>
      <div class="slot-carta" id="slot-humano-2"></div>
      <div class="slot-carta" id="slot-humano-3"></div>
    </div>
  </div>

  <h2>Tu Mano</h2>
  <div class="mano-jugador fila-jugador" id="mano-humano"></div>

  <div id="controles-juego">
      <button id="btn-envido" onclick="cantarEnvido()">Cantar Envido</button>
      <button id="btn-nuevo-juego" onclick="iniciarJuego()">Jugar de Nuevo</button>
  </div>

  <script>
    // --- Definiciones del Juego (sin cambios) ---
    // ... (El bloque de constantes y funciones básicas como crearBarajaTruco, barajar, etc., no cambia)
    const PALOS = ['oros', 'copas', 'espadas', 'bastos'];
    const NUMEROS = [1, 2, 3, 4, 5, 6, 7, 10, 11, 12];
    const JERARQUIA_TRUCO = {
      '1-espadas': 1, '1-bastos': 2, '7-espadas': 3, '7-oros': 4,
      '3-espadas': 5, '3-oros': 5, '3-copas': 5, '3-bastos': 5,
      '2-espadas': 6, '2-oros': 6, '2-copas': 6, '2-bastos': 6,
      '1-oros': 7, '1-copas': 7,
      '12-espadas': 8, '12-oros': 8, '12-copas': 8, '12-bastos': 8,
      '11-espadas': 9, '11-oros': 9, '11-copas': 9, '11-bastos': 9,
      '10-espadas': 10, '10-oros': 10, '10-copas': 10, '10-bastos': 10,
      '7-copas': 11, '7-bastos': 11,
      '6-espadas': 12, '6-oros': 12, '6-copas': 12, '6-bastos': 12,
      '5-espadas': 13, '5-oros': 13, '5-copas': 13, '5-bastos': 13,
      '4-espadas': 14, '4-oros': 14, '4-copas': 14, '4-bastos': 14,
    };
    function crearBarajaTruco() {
      const baraja = [];
      for (const palo of PALOS) { for (const numero of NUMEROS) { baraja.push({ numero, palo, valorEnvido: (numero >= 10) ? 0 : numero, rankingTruco: JERARQUIA_TRUCO[`${numero}-${palo}`], nombre: `${numero} de ${palo}`, id: `${numero}-${palo}` }); } }
      return baraja;
    }
    function barajar(b) { for (let i = b.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1));[b[i], b[j]] = [b[j], b[i]]; } }
    function compararCartas(c1, c2) { if (c1.rankingTruco < c2.rankingTruco) return 'humano'; if (c2.rankingTruco < c1.rankingTruco) return 'cpu'; return 'empate'; }
    function calcularEnvido(mano) {
      const palos = {};
      for (const carta of mano) { if (!palos[carta.palo]) { palos[carta.palo] = []; } palos[carta.palo].push(carta.valorEnvido); }
      let mejorPuntaje = 0;
      for (const palo in palos) {
        const cartasDelPalo = palos[palo];
        if (cartasDelPalo.length >= 2) {
          cartasDelPalo.sort((a, b) => b - a); 
          const puntaje = 20 + cartasDelPalo[0] + cartasDelPalo[1];
          if (puntaje > mejorPuntaje) { mejorPuntaje = puntaje; }
        }
      }
      if (mejorPuntaje === 0) { const valores = mano.map(carta => carta.valorEnvido); mejorPuntaje = Math.max(...valores); }
      return mejorPuntaje;
    }


    // --- Estado del Juego ---
    let jugadorHumano, jugadorCPU, manoActual, manosGanadas, resultadosManos, turnoDelHumano, envidoYaCantado;

    // --- Elementos del DOM ---
    const divManoHumano = document.getElementById('mano-humano');
    const divInfoJuego = document.getElementById('info-juego');
    const btnNuevoJuego = document.getElementById('btn-nuevo-juego');
    const btnEnvido = document.getElementById('btn-envido');

    function iniciarJuego() {
      // (Re)iniciar estado
      jugadorHumano = { nombre: 'Jugador', mano: [] };
      jugadorCPU = { nombre: 'Computadora', mano: [] };
      manoActual = 1;
      manosGanadas = { humano: 0, cpu: 0 };
      resultadosManos = [];
      turnoDelHumano = true;
      envidoYaCantado = false;
      
      // (Re)iniciar UI
      btnNuevoJuego.style.display = 'none';
      btnEnvido.style.display = 'inline-block';
      for(let i=1; i<=3; i++) {
          document.getElementById(`slot-humano-${i}`).innerHTML = '';
          document.getElementById(`slot-cpu-${i}`).innerHTML = '';
      }
      
      const baraja = crearBarajaTruco();
      barajar(baraja);
      for (let i = 0; i < 3; i++) {
        jugadorHumano.mano.push(baraja.pop());
        jugadorCPU.mano.push(baraja.pop());
      }
      
      actualizarInfo(`Mano 1. Es tu turno.`);
      dibujarMano();
    }

    function dibujarMano() {
      divManoHumano.innerHTML = '';
      jugadorHumano.mano.forEach(carta => {
        const cartaHTML = crearElementoCarta(carta);
        cartaHTML.disabled = !turnoDelHumano;
        cartaHTML.onclick = () => jugarCarta(carta);
        divManoHumano.appendChild(cartaHTML);
      });
    }

    function jugarCarta(cartaHumano) {
      if (!turnoDelHumano) return;
      turnoDelHumano = false;
      btnEnvido.style.display = 'none'; // Ya no se puede cantar envido

      jugadorHumano.mano = jugadorHumano.mano.filter(c => c.id !== cartaHumano.id);
      dibujarMano();
      
      const cartaCPU = jugadorCPU.mano.shift();
      
      const slotHumano = document.getElementById(`slot-humano-${manoActual}`);
      const slotCPU = document.getElementById(`slot-cpu-${manoActual}`);

      const cartaHumanoEl = crearElementoCarta(cartaHumano);
      const cartaCPU_El = crearElementoCarta(cartaCPU);

      slotHumano.appendChild(cartaHumanoEl);
      slotCPU.appendChild(cartaCPU_El);

      actualizarInfo(`La CPU está pensando...`);
      setTimeout(() => evaluarMano(cartaHumano, cartaCPU, cartaHumanoEl, cartaCPU_El), 1000);
    }
    
    function evaluarMano(cartaH, cartaC, elH, elC) {
      const ganadorMano = compararCartas(cartaH, cartaC);
      resultadosManos.push(ganadorMano);
      
      if (ganadorMano === 'humano') {
        manosGanadas.humano++;
        elH.classList.add('carta-ganadora');
        elC.classList.add('carta-perdedora');
      } else if (ganadorMano === 'cpu') {
        manosGanadas.cpu++;
        elC.classList.add('carta-ganadora');
        elH.classList.add('carta-perdedora');
      }
      
      let mensaje = (ganadorMano === 'humano') ? "¡Ganaste esta mano!" : (ganadorMano === 'cpu') ? "La CPU gana esta mano." : "¡Mano parda!";
      actualizarInfo(mensaje);
      setTimeout(revisarFinDeRonda, 2000);
    }

    function revisarFinDeRonda() {
      const ganadorPorDosManos = manosGanadas.humano === 2 || manosGanadas.cpu === 2;
      const ganadorPorParda = resultadosManos.length > 1 && resultadosManos[0] === 'empate' && resultadosManos[1] !== 'empate';

      if (ganadorPorDosManos || ganadorPorParda || manoActual === 3) {
        finalizarRonda();
      } else {
        prepararSiguienteMano();
      }
    }

    function prepararSiguienteMano() {
      manoActual++;
      turnoDelHumano = true;
      actualizarInfo(`Mano ${manoActual}. Es tu turno.`);
      dibujarMano();
    }

    function finalizarRonda() {
      let ganadorFinal = '';
      if (manosGanadas.humano > manosGanadas.cpu) ganadorFinal = jugadorHumano.nombre;
      else if (manosGanadas.cpu > manosGanadas.humano) ganadorFinal = jugadorCPU.nombre;
      else ganadorFinal = (resultadosManos[0] === 'humano') ? jugadorHumano.nombre : (resultadosManos[0] === 'cpu') ? jugadorCPU.nombre : jugadorHumano.nombre;
      
      actualizarInfo(`🏆 ¡Gana la ronda ${ganadorFinal}! 🏆`);
      btnNuevoJuego.style.display = 'inline-block';
      btnEnvido.style.display = 'none';
      turnoDelHumano = false;
      dibujarMano();
    }
    
    // --- NUEVAS FUNCIONES ---
    function cantarEnvido() {
        if(envidoYaCantado || manoActual > 1) return;
        envidoYaCantado = true;
        btnEnvido.style.display = 'none';

        const puntosHumano = calcularEnvido(jugadorHumano.mano);
        const puntosCPU = calcularEnvido(jugadorCPU.mano);

        let mensaje = `Cantaste Envido. Tienes ${puntosHumano}. La CPU tiene ${puntosCPU}.<br>`;
        if (puntosHumano > puntosCPU) {
            mensaje += "¡Ganaste los puntos del envido!";
        } else if (puntosCPU > puntosHumano) {
            mensaje += "La CPU gana los puntos del envido.";
        } else {
            mensaje += "¡Empate! Gana el mano (tú).";
        }
        
        actualizarInfo(mensaje);
        // El juego no se detiene, solo muestra la info y permite seguir jugando la mano.
    }

    function crearElementoCarta(carta) {
        const el = document.createElement('div');
        el.className = `carta palo-${carta.palo}`;
        el.innerHTML = `<span>${carta.numero}</span><span>${carta.palo.slice(0,1).toUpperCase()}</span>`;
        return el;
    }

    function actualizarInfo(mensaje) { divInfoJuego.innerHTML = mensaje; }

    iniciarJuego();
  </script>
</body>
</html>

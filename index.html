<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Truco Argentino</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="setup-screen" class="pantalla activa">
        <div class="setup-container">
            <h1>Truco Argentino</h1>
            <div class="form-group">
                <label for="player-name">Nombre del Jugador:</label>
                <input type="text" id="player-name" value="Jugador 1" maxlength="15">
            </div>
            <div class="form-group">
                <label>Jugar a:</label>
                <label><input type="radio" name="puntos" value="15"> 15 Puntos</label>
                <label><input type="radio" name="puntos" value="30" checked> 30 Puntos</label>
            </div>
            <div class="form-group">
                <label><input type="checkbox" id="con-flor"> Jugar con Flor</label>
            </div>
            <button id="start-game-btn">Comenzar Partida</button>
        </div>
    </div>

    <div id="game-screen" class="pantalla">
        <div id="col-botones" class="columna">
            <div class="botonera">
                <button id="btn-envido" class="btn-canto">Envido</button>
                <button id="btn-real-envido" class="btn-canto">Real Envido</button>
                <button id="btn-falta-envido" class="btn-canto">Falta Envido</button>
                <button id="btn-truco" class="btn-canto">Truco</button>
                <button id="btn-retruco" class="btn-canto">Re-Truco</button>
                <button id="btn-vale-cuatro" class="btn-canto">Vale Cuatro</button>
                <button id="btn-quiero" class="btn-respuesta">Quiero</button>
                <button id="btn-no-quiero" class="btn-respuesta">No Quiero</button>
                <button id="btn-ir-al-mazo" class="btn-mazo">Ir al Mazo</button>
            </div>
        </div>

        <div id="col-juego" class="columna">
            <div id="cpu-hand" class="mano">
                </div>
            <div id="mesa">
                <div class="slot-mesa" id="cpu-slot-1"></div>
                <div class="slot-mesa" id="cpu-slot-2"></div>
                <div class="slot-mesa" id="cpu-slot-3"></div>
                <div class="slot-mesa" id="player-slot-1"></div>
                <div class="slot-mesa" id="player-slot-2"></div>
                <div class="slot-mesa" id="player-slot-3"></div>
            </div>
            <div id="player-hand" class="mano">
                </div>
        </div>

        <div id="col-marcador" class="columna">
            <div class="marcador-container">
                <h3 id="cpu-name-marcador">CPU</h3>
                <div id="marcador-cpu" class="marcador"></div>
                <hr>
                <h3 id="player-name-marcador">Jugador</h3>
                <div id="marcador-player" class="marcador"></div>
            </div>
        </div>

        <div id="col-historial" class="columna">
            <h3>Historial</h3>
            <div id="historial-log">
                </div>
        </div>
    </div>

    <script src="js/main.js" type="module"></script>
</body>
</html>

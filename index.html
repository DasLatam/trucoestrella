<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>TrucoEstrella</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <span id="version-display">v4.3</span>
  <h1>TrucoEstrella</h1>

  <div id="pantalla-config">
    <h3>Configurar Partida</h3>
    <div class="opcion-config"><label for="nombre-jugador">Tu Nombre:</label><br><input type="text" id="nombre-jugador" placeholder="Jugador" maxlength="12"></div>
    <div class="opcion-config"><span>Jugar a:</span><input type="radio" id="puntos15" name="puntos-partida" value="15" checked><label for="puntos15">15 Puntos</label><input type="radio" id="puntos30" name="puntos-partida" value="30"><label for="puntos30">30 Puntos</label></div>
    <div class="opcion-config"><input type="checkbox" id="con-flor" name="con-flor" checked><label for="con-flor">Jugar con Flor</label></div>
    <div class="opcion-config"><span>Diseño:</span><input type="radio" id="layout-pc" name="layout" value="pc" checked><label for="layout-pc">PC</label><input type="radio" id="layout-celular" name="layout" value="celular"><label for="layout-celular">Celular</label></div>
    <button id="btn-comenzar">Comenzar Partida</button>
  </div>

  <div id="area-juego-wrapper">
    <div class="contenedor-principal">
        <div id="columna-controles">
            <h3>Cantos</h3>
            <div id="controles-juego">
                <button id="btn-flor">Flor</button><button id="btn-envido">Envido</button><button id="btn-real-envido">R. Envido</button><button id="btn-falta-envido">F. Envido</button><button id="btn-truco">Truco</button><button id="btn-quiero">Quiero</button><button id="btn-no-quiero">No Quiero</button><button id="btn-re-truco">Re-Truco</button><button id="btn-vale-cuatro">V. Cuatro</button>
            </div>
        </div>
        <div id="columna-juego">
            <div id="marcador-digital"></div>
            <h2 id="cpu-titulo"></h2>
            <div class="mano-cpu fila-jugador" id="mano-cpu"></div>
            <div id="info-juego"></div>
            <div class="mesa" id="mesa">
                <div class="fila-jugador" id="fila-cpu-mesa"><div class="slot-carta" id="slot-cpu-1"></div><div class="slot-carta" id="slot-cpu-2"></div><div class="slot-carta" id="slot-cpu-3"></div></div>
                <div class="fila-jugador" id="fila-humano-mesa"><div class="slot-carta" id="slot-humano-1"></div><div class="slot-carta" id="slot-humano-2"></div><div class="slot-carta" id="slot-humano-3"></div></div>
            </div>
            <h2 id="nombre-mano-humano"></h2>
            <div class="mano-jugador fila-jugador" id="mano-humano"></div>
        </div>
        <div id="columna-marcador">
            <h3>Puntos</h3>
            <div id="marcador-grafico">
                <div class="marcador-columna"><h3 id="marcador-humano-nombre"></h3><div id="marcador-humano-porotos"></div></div>
                <div class="marcador-columna"><h3 id="marcador-cpu-nombre"></h3><div id="marcador-cpu-porotos"></div></div>
            </div>
        </div>
        <div id="columna-chat">
            <h3>Historial</h3>
            <div id="log-juego"></div>
        </div>
    </div>
    <div id="controles-finales">
        <button id="btn-nuevo-juego">Jugar Nueva Partida</button>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/ia.js"></script>
  <script src="js/main.js"></script>
</body>
</html>

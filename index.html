<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>TrucoEstrella</title>
  <style>
    body { font-family: sans-serif; background-color: #004d40; color: white; text-align: center; }
    h1, h2 { color: #b2dfdb; }
    .mesa { background-color: #00695c; border: 2px solid #00796b; border-radius: 10px; padding: 20px; margin: 20px auto; min-height: 150px; display: flex; justify-content: center; align-items: center; gap: 20px; }
    .mano-jugador { margin-top: 20px; min-height: 140px; }
    .carta {
      background-color: white; color: black; border: 2px solid black; border-radius: 8px;
      width: 80px; height: 120px; display: inline-flex; flex-direction: column;
      justify-content: space-between; padding: 5px; font-size: 20px; font-weight: bold;
      cursor: pointer; transition: all 0.2s; box-shadow: 3px 3px 5px rgba(0,0,0,0.3);
    }
    .carta:not([disabled]):hover { transform: translateY(-10px) scale(1.05); border-color: #ffab00; }
    .carta[disabled] { cursor: not-allowed; opacity: 0.7; }
    .carta.palo-oros, .carta.palo-bastos { color: #b71c1c; }
    #info-juego { font-size: 1.2em; min-height: 30px; margin: 15px 0; color: #ffcc80; }
    #btn-nuevo-juego {
      padding: 10px 20px; font-size: 1em; cursor: pointer; border-radius: 5px;
      border: none; background-color: #ffab00; color: black; font-weight: bold;
      margin-top: 20px; display: none; /* Oculto por defecto */
    }
  </style>
</head>
<body>
  <h1>TrucoEstrella</h1>
  <div id="info-juego"></div>
  <h2>Mesa</h2>
  <div class="mesa" id="mesa"></div>
  <h2>Tu Mano</h2>
  <div class="mano-jugador" id="mano-humano"></div>
  <button id="btn-nuevo-juego" onclick="iniciarJuego()">Jugar de Nuevo</button>

  <script>
    // --- Definiciones Fundamentales (sin cambios) ---
    const PALOS = ['oros', 'copas', 'espadas', 'bastos'];
    const NUMEROS = [1, 2, 3, 4, 5, 6, 7, 10, 11, 12];
    const JERARQUIA_TRUCO = {
      '1-espadas': 1, '1-bastos': 2, '7-espadas': 3, '7-oros': 4,
      '3-espadas': 5, '3-oros': 5, '3-copas': 5, '3-bastos': 5,
      '2-espadas': 6, '2-oros': 6, '2-copas': 6, '2-bastos': 6,
      '1-oros': 7, '1-copas': 7,
      '12-espadas': 8, '12-oros': 8, '12-copas': 8, '12-bastos': 8,
      '11-espadas': 9, '11-oros': 9, '11-copas': 9, '11-bastos': 9,
      '10-espadas': 10, '10-oros': 10, '10-copas': 10, '10-bastos': 10,
      '7-copas': 11, '7-bastos': 11,
      '6-espadas': 12, '6-oros': 12, '6-copas': 12, '6-bastos': 12,
      '5-espadas': 13, '5-oros': 13, '5-copas': 13, '5-bastos': 13,
      '4-espadas': 14, '4-oros': 14, '4-copas': 14, '4-bastos': 14,
    };
    function crearBarajaTruco() {
      const baraja = [];
      for (const palo of PALOS) { for (const numero of NUMEROS) { baraja.push({ numero, palo, valorEnvido: (numero >= 10) ? 0 : numero, rankingTruco: JERARQUIA_TRUCO[`${numero}-${palo}`], nombre: `${numero} de ${palo}`, id: `${numero}-${palo}` }); } }
      return baraja;
    }
    function barajar(b) { for (let i = b.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1));[b[i], b[j]] = [b[j], b[i]]; } }
    function compararCartas(c1, c2) { if (c1.rankingTruco < c2.rankingTruco) return 'humano'; if (c2.rankingTruco < c1.rankingTruco) return 'cpu'; return 'empate'; }

    // --- NUEVO: ESTADO DEL JUEGO (La memoria del juego) ---
    let jugadorHumano = { nombre: 'Jugador', mano: [] };
    let jugadorCPU = { nombre: 'Computadora', mano: [] };
    let manoActual;
    let manosGanadas;
    let resultadosManos;
    let turnoDelHumano;

    // --- Elementos del DOM ---
    const divManoHumano = document.getElementById('mano-humano');
    const divMesa = document.getElementById('mesa');
    const divInfoJuego = document.getElementById('info-juego');
    const btnNuevoJuego = document.getElementById('btn-nuevo-juego');

    function iniciarJuego() {
      // 1. (Re)iniciar el estado del juego
      manoActual = 1;
      manosGanadas = { humano: 0, cpu: 0 };
      resultadosManos = [];
      turnoDelHumano = true;
      btnNuevoJuego.style.display = 'none';
      divMesa.innerHTML = '';
      
      const baraja = crearBarajaTruco();
      barajar(baraja);

      jugadorHumano.mano = [];
      jugadorCPU.mano = [];
      for (let i = 0; i < 3; i++) {
        jugadorHumano.mano.push(baraja.pop());
        jugadorCPU.mano.push(baraja.pop());
      }
      
      actualizarInfo(`Mano 1. Es tu turno.`);
      dibujarMano();
    }

    function dibujarMano() {
      divManoHumano.innerHTML = '';
      jugadorHumano.mano.forEach(carta => {
        const cartaHTML = document.createElement('button');
        cartaHTML.className = `carta palo-${carta.palo}`;
        cartaHTML.innerHTML = `<span>${carta.numero}</span><span>${carta.palo.slice(0,1).toUpperCase()}</span>`;
        cartaHTML.disabled = !turnoDelHumano;
        cartaHTML.onclick = () => jugarCarta(carta);
        divManoHumano.appendChild(cartaHTML);
      });
    }
    
    function jugarCarta(cartaHumano) {
      if (!turnoDelHumano) return; // No hacer nada si no es su turno
      turnoDelHumano = false;
      
      // Quitar la carta de la mano y dibujarla en la mesa
      jugadorHumano.mano = jugadorHumano.mano.filter(c => c.id !== cartaHumano.id);
      dibujarMano();
      
      // CPU juega su carta (estrategia simple: la primera que tenga)
      const cartaCPU = jugadorCPU.mano.shift();
      
      // Dibujar ambas cartas en la mesa
      divMesa.innerHTML = ''; // Limpiar mesa anterior
      dibujarCartaEnMesa(cartaHumano, 'humano');
      dibujarCartaEnMesa(cartaCPU, 'cpu');
      
      // Evaluar la mano después de una pausa para que se vea la jugada
      actualizarInfo(`La CPU está pensando...`);
      setTimeout(() => evaluarMano(cartaHumano, cartaCPU), 1500);
    }
    
    function evaluarMano(cartaHumano, cartaCPU) {
      const ganadorMano = compararCartas(cartaHumano, cartaCPU);
      resultadosManos.push(ganadorMano);
      
      if (ganadorMano !== 'empate') {
        manosGanadas[ganadorMano]++;
      }
      
      let mensaje = `Jugaste ${cartaHumano.nombre}. CPU jugó ${cartaCPU.nombre}.<br>`;
      if (ganadorMano === 'humano') mensaje += "¡Ganaste esta mano!";
      else if (ganadorMano === 'cpu') mensaje += "La CPU gana esta mano.";
      else mensaje += "¡Mano parda!";
      actualizarInfo(mensaje);
      
      // Después de una pausa, revisar si la ronda terminó o preparar la siguiente
      setTimeout(revisarFinDeRonda, 2000);
    }
    
    function revisarFinDeRonda() {
      // Condiciones para que termine la ronda
      const ganadorPorDosManos = manosGanadas.humano === 2 || manosGanadas.cpu === 2;
      const ganadorPorParda = resultadosManos[0] === 'empate' && resultadosManos[1] !== 'empate';

      if (ganadorPorDosManos || ganadorPorParda || manoActual === 3) {
        finalizarRonda();
      } else {
        prepararSiguienteMano();
      }
    }

    function prepararSiguienteMano() {
      manoActual++;
      turnoDelHumano = true;
      divMesa.innerHTML = '';
      actualizarInfo(`Mano ${manoActual}. Es tu turno.`);
      dibujarMano();
    }

    function finalizarRonda() {
      let ganadorFinal = '';
      if (manosGanadas.humano > manosGanadas.cpu) {
        ganadorFinal = jugadorHumano.nombre;
      } else if (manosGanadas.cpu > manosGanadas.humano) {
        ganadorFinal = jugadorCPU.nombre;
      } else { // Empate en manos ganadas, define la primera mano o el "mano"
        if (resultadosManos[0] === 'humano') ganadorFinal = jugadorHumano.nombre;
        else if (resultadosManos[0] === 'cpu') ganadorFinal = jugadorCPU.nombre;
        else ganadorFinal = jugadorHumano.nombre; // Si la primera es parda, gana el mano
      }
      
      actualizarInfo(`🏆 ¡Gana la ronda ${ganadorFinal}! 🏆`);
      btnNuevoJuego.style.display = 'inline-block';
      turnoDelHumano = false;
      dibujarMano(); // Redibujar para deshabilitar las cartas
    }

    function dibujarCartaEnMesa(carta, jugador) {
      const cartaHTML = document.createElement('div');
      cartaHTML.className = `carta palo-${carta.palo}`;
      cartaHTML.innerHTML = `<span>${carta.numero}</span><span>${carta.palo.slice(0,1).toUpperCase()}</span>`;
      divMesa.appendChild(cartaHTML);
    }
    
    function actualizarInfo(mensaje) {
      divInfoJuego.innerHTML = mensaje;
    }

    // --- Iniciar el Juego ---
    iniciarJuego();
  </script>
</body>
</html>

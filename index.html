<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>TrucoEstrella</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #004d40; color: white; text-align: center; }
    h1, h2, h3 { color: #b2dfdb; text-shadow: 1px 1px 2px black; }
    
    #version-display { position: absolute; top: 5px; right: 10px; font-size: 0.8em; color: rgba(255,255,255,0.4); }
    #pantalla-config { padding: 20px; background-color: #00695c; max-width: 400px; margin: 20px auto; border-radius: 10px; box-shadow: 0 0 15px black; }
    .opcion-config { margin: 15px 0; font-size: 1.2em; text-align: left; padding-left: 20px;}
    .opcion-config label { margin: 0 10px; }
    .opcion-config input[type="text"] { font-size: 0.9em; padding: 5px; border-radius: 4px; border: 1px solid #b2dfdb; }
    #btn-comenzar { background-color: #4CAF50 !important; font-size: 1.2em !important; margin-top: 20px !important; display: inline-block !important; }
    
    #area-juego-wrapper { display: none; }
    .contenedor-principal { display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 20px; }
    #marcador { font-size: 1.8em; font-weight: bold; color: #ffeb3b; background-color: rgba(0,0,0,0.2); padding: 5px 10px; border-radius: 8px; display: inline-block; margin-bottom: 10px; }
    .mesa { background-color: #00695c; border: 2px solid #00796b; border-radius: 10px; padding: 10px; margin: 10px auto; display: flex; flex-direction: column; gap: 15px; width: 280px; }
    .fila-jugador { display: flex; justify-content: space-around; gap: 10px; min-height: 105px; }
    .slot-carta { width: 70px; height: 105px; border: 2px dashed rgba(255,255,255,0.2); border-radius: 8px; position: relative; }
    .mano-jugador .carta, .mano-cpu .carta { width: 70px; height: 105px; }
    .carta { width: 100%; height: 100%; transition: all 0.3s ease; position: absolute; top: 0; left: 0; }
    .mano-jugador .carta { position: static; }
    .mano-jugador .carta:not([disabled]) { cursor: pointer; }
    .mano-jugador .carta:not([disabled]):hover { transform: translateY(-10px) scale(1.05); }
    .carta[disabled] { cursor: not-allowed; opacity: 0.8; }
    #info-juego { font-size: 1.2em; min-height: 40px; margin: 15px 0; color: #ffcc80; font-weight: bold; }
    #controles-juego { display: flex; justify-content: center; align-items: center; flex-wrap: wrap; gap: 10px; padding: 10px; max-width: 400px; margin: auto; }
    #controles-juego button { padding: 10px 20px; font-size: 1em; cursor: pointer; border-radius: 5px; border: none; background-color: #ffab00; color: black; font-weight: bold; display: none; }
    #log-juego-container { text-align: center; }
    #log-juego { width: 350px; height: 150px; background-color: rgba(0,0,0,0.2); border: 2px solid #00796b; border-radius: 8px; padding: 10px; overflow-y: auto; font-family: monospace; text-align: left; margin: auto;}
    #log-juego p { margin: 5px 0; font-size: 0.9em; }
    #log-juego strong { color: #ffcc80; }
    .carta-perdedora svg { opacity: 0.6; }
    .carta-ganadora svg { border: 3px solid #ffeb3b; box-shadow: 0 0 15px #ffeb3b; }
  </style>
</head>
<body>
  <span id="version-display">v1.16</span>
  <h1>TrucoEstrella</h1>
  <div id="pantalla-config">
    <h3>Configurar Partida</h3>
    <div class="opcion-config"><label for="nombre-jugador">Tu Nombre:</label><br><input type="text" id="nombre-jugador" placeholder="Jugador" maxlength="12"></div>
    <div class="opcion-config"><span>Jugar a:</span><input type="radio" id="puntos15" name="puntos-partida" value="15" checked><label for="puntos15">15 Puntos</label><input type="radio" id="puntos30" name="puntos-partida" value="30"><label for="puntos30">30 Puntos</label></div>
    <div class="opcion-config"><input type="checkbox" id="con-flor" name="con-flor" checked><label for="con-flor">Jugar con Flor</label></div>
    <button id="btn-comenzar" onclick="comenzarPartida()">Comenzar Partida</button>
  </div>
  <div id="area-juego-wrapper">
    <div class="contenedor-principal">
        <div id="area-juego">
            <div id="marcador"></div>
            <h2>Mano de TrucoEstrella</h2>
            <div class="mano-cpu fila-jugador" id="mano-cpu"></div>
            <div id="info-juego"></div>
            <div class="mesa" id="mesa">
                <div class="fila-jugador" id="fila-cpu-mesa"><div class="slot-carta" id="slot-cpu-1"></div><div class="slot-carta" id="slot-cpu-2"></div><div class="slot-carta" id="slot-cpu-3"></div></div>
                <div class="fila-jugador" id="fila-humano-mesa"><div class="slot-carta" id="slot-humano-1"></div><div class="slot-carta" id="slot-humano-2"></div><div class="slot-carta" id="slot-humano-3"></div></div>
            </div>
            <h2>Tu Mano</h2>
            <div class="mano-jugador fila-jugador" id="mano-humano"></div>
            <div id="controles-juego">
                <button id="btn-flor" onclick="manejarCantoFlor()">Cantar Flor</button><button id="btn-envido" onclick="manejarCantoEnvido('humano', 1)">Envido</button><button id="btn-real-envido" onclick="manejarCantoEnvido('humano', 2)">Real Envido</button><button id="btn-falta-envido" onclick="manejarCantoEnvido('humano', 3)">Falta Envido</button><button id="btn-truco" onclick="manejarCantoTruco('humano')">Truco</button><button id="btn-quiero" onclick="manejarRespuesta('humano', 'quiero')">Quiero</button><button id="btn-no-quiero" onclick="manejarRespuesta('humano', 'no-quiero')">No Quiero</button><button id="btn-re-truco" onclick="manejarRespuesta('humano', 're-truco')">Re-Truco</button><button id="btn-vale-cuatro" onclick="manejarRespuesta('humano', 'vale-cuatro')">Vale Cuatro</button><button id="btn-nuevo-juego" onclick="iniciarPartida()">Jugar Nueva Partida</button>
            </div>
        </div>
        <div id="log-juego-container">
            <h3>Historial</h3>
            <div id="log-juego"></div>
        </div>
    </div>
  </div>

  <script>
    let PUNTOS_PARA_GANAR, JUGAR_CON_FLOR;
    const PALOS = ['oros', 'copas', 'espadas', 'bastos'];
    const NUMEROS = [1, 2, 3, 4, 5, 6, 7, 10, 11, 12];
    const JERARQUIA_TRUCO = { '1-espadas': 1, '1-bastos': 2, '7-espadas': 3, '7-oros': 4, '3-espadas': 5, '3-oros': 5, '3-copas': 5, '3-bastos': 5, '2-espadas': 6, '2-oros': 6, '2-copas': 6, '2-bastos': 6, '1-oros': 7, '1-copas': 7, '12-espadas': 8, '12-oros': 8, '12-copas': 8, '12-bastos': 8, '11-espadas': 9, '11-oros': 9, '11-copas': 9, '11-bastos': 9, '10-espadas': 10, '10-oros': 10, '10-copas': 10, '10-bastos': 10, '7-copas': 11, '7-bastos': 11, '6-espadas': 12, '6-oros': 12, '6-copas': 12, '6-bastos': 12, '5-espadas': 13, '5-oros': 13, '5-copas': 13, '5-bastos': 13, '4-espadas': 14, '4-oros': 14, '4-copas': 14, '4-bastos': 14 };
    const SVG_ICONS = { oros: `<g transform="translate(21, 40) scale(0.4)"><circle cx="50" cy="50" r="45" fill="#FFD700" stroke="#DAA520" stroke-width="5"/></g>`, copas: `<g transform="translate(16, 18) scale(0.6)"><path d="M 25,5 C 45,5 45,25 25,25 C 5,25 5,5 25,5 M 15,22 C 15,35 35,35 35,22 L 32 60 L 18 60 Z M 10 60 L 40 60 L 35 65 L 15 65 Z" fill="#B71C1C" stroke="#7f0000" stroke-width="2"/></g>`, espadas: `<g transform="translate(18, 15) scale(0.6)"><path d="M 25 65 L 25 45 C 20 45, 20 40, 15 40 L 35 40 C 30 40, 30 45, 25 45 M 25 65 L 15 70 L 35 70 Z M 25 5 L 25 40" stroke="black" stroke-width="4" fill="none" /><path d="M25 5 L 35 15 L 15 15 Z" fill="#87CEEB"/></g>`, bastos: `<g transform="translate(20, 15) scale(0.6)"><path d="M20,65 C30,55 30,40 20,30 C10,40 10,55 20,65 M20,5 L20,65" stroke="#388E3C" stroke-width="7" stroke-linecap="round" fill="none"/><path d="M20,15 L30,20 L20,25 L10,20Z" fill="#A5D6A7"/></g>` };
    const SVG_LOMO_CARTA = `<svg viewbox="0 0 70 105" style="background-color: #4A148C; border: 2px solid black; border-radius: 8px; width: 100%; height: 100%;"><text x="35" y="60" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Truco</text><text x="35" y="75" font-size="14" font-weight="bold" fill="#FFD700" text-anchor="middle">Estrella</text></svg>`;
    let marcador, jugadorHumano, jugadorCPU, manoActual, manosGanadas, resultadosManos, turnoDelHumano, estadoEnvido, estadoTruco, cantoActual, tieneFlor;
    let manoDeLaRonda, jugadorMano, cartaJugadaPorLider;
    const botones = { log: document.getElementById('log-juego'), marcador: document.getElementById('marcador'), info: document.getElementById('info-juego'), mano: document.getElementById('mano-humano'), manoCPU: document.getElementById('mano-cpu'), nuevoJuego: document.getElementById('btn-nuevo-juego'), flor: document.getElementById('btn-flor'), envido: document.getElementById('btn-envido'), realEnvido: document.getElementById('btn-real-envido'), faltaEnvido: document.getElementById('btn-falta-envido'), truco: document.getElementById('btn-truco'), quiero: document.getElementById('btn-quiero'), noQuiero: document.getElementById('btn-no-quiero'), reTruco: document.getElementById('btn-re-truco'), valeCuatro: document.getElementById('btn-vale-cuatro') };

    // --- Funciones de Lógica de Juego ---
    function comenzarPartida() { PUNTOS_PARA_GANAR = document.getElementById('puntos30').checked ? 30 : 15; JUGAR_CON_FLOR = document.getElementById('con-flor').checked; const nombreJugador = document.getElementById('nombre-jugador').value || 'Jugador'; jugadorHumano = { nombre: nombreJugador, mano: [] }; jugadorCPU = { nombre: 'TrucoEstrella', mano: [] }; document.getElementById('pantalla-config').style.display = 'none'; document.getElementById('area-juego-wrapper').style.display = 'block'; manoDeLaRonda = 'cpu'; iniciarPartida(); }
    function iniciarPartida() { marcador = { humano: 0, cpu: 0 }; manoDeLaRonda = (manoDeLaRonda === 'humano') ? 'cpu' : 'humano'; iniciarRonda(); }
    function iniciarRonda() {
      manoActual = 1; manosGanadas = { humano: 0, cpu: 0 }; resultadosManos = [];
      estadoEnvido = { nivel: 0, respondido: false }; estadoTruco = 0; cantoActual = null; tieneFlor = { humano: false, cpu: false, respondido: false };
      jugadorMano = manoDeLaRonda; cartaJugadaPorLider = null;
      jugadorHumano.mano = []; jugadorCPU.mano = [];
      botones.log.innerHTML = ''; actualizarMarcador(); ocultarTodosLosControles(); botones.nuevoJuego.style.display = 'none';
      for(let i=1; i<=3; i++) { document.getElementById(`slot-humano-${i}`).innerHTML = ''; document.getElementById(`slot-cpu-${i}`).innerHTML = ''; }
      const baraja = crearBarajaTruco(); barajar(baraja);
      for (let i = 0; i < 3; i++) { jugadorHumano.mano.push(baraja.pop()); jugadorCPU.mano.push(baraja.pop()); }
      jugadorCPU.mano.sort((a,b) => a.rankingTruco - b.rankingTruco);
      if(JUGAR_CON_FLOR) { tieneFlor.humano = detectarFlor(jugadorHumano.mano); tieneFlor.cpu = detectarFlor(jugadorCPU.mano); }
      dibujarManoCPU(true); dibujarMano();
      if (tieneFlor.humano) { botones.flor.style.display = 'inline-block'; actualizarInfo(`¡Tienes Flor! Debes cantarla.`); }
      else if (tieneFlor.cpu) { agregarAlLog(jugadorCPU.nombre, "¡FLOR!"); finalizarRonda(); }
      else { prepararSiguienteMano(); }
    }
    function prepararSiguienteMano() {
        if(manoActual > 1) {
            const ganadorManoAnterior = resultadosManos[manoActual - 2];
            if (ganadorManoAnterior !== 'empate') jugadorMano = ganadorManoAnterior;
        }
        turnoDelHumano = (jugadorMano === 'humano');
        dibujarMano();
        if (turnoDelHumano) { actualizarInfo(`Mano ${manoActual}. Eres mano, te toca jugar.`); mostrarBotonesDeCantoInicial(); }
        else { actualizarInfo(`Mano ${manoActual}. Juega ${jugadorCPU.nombre}.`); setTimeout(jugarTurnoCPU, 1500); }
    }
    function jugarCarta(cartaJugada) {
        if (!turnoDelHumano) return;
        if(tieneFlor.humano && !tieneFlor.respondido) { actualizarInfo("No puedes jugar, debes cantar la Flor."); return; }
        turnoDelHumano = false;
        ocultarTodosLosControles(true);
        jugadorHumano.mano = jugadorHumano.mano.filter(c => c.id !== cartaJugada.id);
        dibujarMano();
        document.getElementById(`slot-humano-${manoActual}`).appendChild(crearElementoCarta(cartaJugada));
        agregarAlLog(jugadorHumano.nombre, `juega ${cartaJugada.nombre}`);
        if (cartaJugadaPorLider) { evaluarMano(cartaJugadaPorLider, cartaJugada); cartaJugadaPorLider = null; }
        else { cartaJugadaPorLider = cartaJugada; actualizarInfo(`Esperando jugada de ${jugadorCPU.nombre}...`); setTimeout(jugarTurnoCPU, 1500); }
    }
    function jugarTurnoCPU() {
        if(manoActual === 1 && !estadoEnvido.respondido && !tieneFlor.cpu && jugadorMano === 'cpu') {
            const misPuntos = calcularEnvido(jugadorCPU.mano);
            if (misPuntos >= 30) {
                manejarCantoEnvido('cpu', 1);
                return;
            }
        }
        const cartaAJugar = elegirCartaCPU();
        if(!cartaAJugar) return; // Si no hay carta (error)
        dibujarManoCPU();
        document.getElementById(`slot-cpu-${manoActual}`).appendChild(crearElementoCarta(cartaAJugar));
        agregarAlLog(jugadorCPU.nombre, `juega ${cartaAJugar.nombre}`);
        if (cartaJugadaPorLider) { evaluarMano(cartaJugadaPorLider, cartaAJugar); cartaJugadaPorLider = null; }
        else { cartaJugadaPorLider = cartaAJugar; turnoDelHumano = true; dibujarMano(); actualizarInfo(`La CPU jugó. Te toca responder.`); mostrarBotonesDeCantoInicial(); }
    }
    function elegirCartaCPU() {
        const manoCPU = jugadorCPU.mano;
        if (!cartaJugadaPorLider) { // CPU es mano, juega la más baja
            return manoCPU.shift();
        } else { // CPU responde
            const cartaGanadora = manoCPU.find(c => compararCartas(c, cartaJugadaPorLider) === 'cpu');
            if (cartaGanadora) { // Juega la más baja que gana
                jugadorCPU.mano = jugadorCPU.mano.filter(c => c.id !== cartaGanadora.id);
                return cartaGanadora;
            } else { // Si no puede ganar, tira la más alta (que igual pierde) para guardar las chicas
                return manoCPU.pop();
            }
        }
    }
    function evaluarMano(c1, c2) {
        const jugadorManoActualEsHumano = (jugadorMano === 'humano');
        const cartaHumano = jugadorManoActualEsHumano ? c1 : c2;
        const cartaCPU = jugadorManoActualEsHumano ? c2 : c1;
        const ganadorMano = compararCartas(cartaHumano, cartaCPU);
        resultadosManos.push(ganadorMano);
        if (ganadorMano !== 'empate') manosGanadas[ganadorMano]++;
        const elHumano = document.getElementById(`slot-humano-${manoActual}`).firstChild.querySelector('svg');
        const elCPU = document.getElementById(`slot-cpu-${manoActual}`).firstChild.querySelector('svg');
        if(ganadorMano === 'humano') elHumano.classList.add('carta-ganadora');
        else if (ganadorMano === 'cpu') elCPU.classList.add('carta-ganadora');
        actualizarInfo((ganadorMano === 'empate') ? 'Mano parda.' : `Gana la mano ${ganadorMano === 'humano' ? jugadorHumano.nombre : jugadorCPU.nombre}.`);
        setTimeout(revisarFinDeRonda, 2000);
    }
    function revisarFinDeRonda() {
        const ganoYEmpardoHumano = manosGanadas.humano === 1 && resultadosManos.length === 2 && resultadosManos[0] === 'humano' && resultadosManos[1] === 'empate';
        const ganoYEmpardoCPU = manosGanadas.cpu === 1 && resultadosManos.length === 2 && resultadosManos[0] === 'cpu' && resultadosManos[1] === 'empate';
        const ganadorPorDosManos = manosGanadas.humano === 2 || manosGanadas.cpu === 2;
        if (ganadorPorDosManos || ganoYEmpardoHumano || ganoYEmpardoCPU || manoActual === 3) {
            finalizarRonda();
        } else { manoActual++; prepararSiguienteMano(); }
    }
    function finalizarRonda(ganadorPorNoQuerer) {
        ocultarTodosLosControles(); let ganadorFinal, puntos;
        if(ganadorPorNoQuerer) {
            ganadorFinal = (ganadorPorNoQuerer === 'humano') ? 'humano' : 'cpu';
            let puntosNoQuerido = { truco: estadoTruco === 0 ? 1 : estadoTruco, envido: [0,1,2,3][estadoEnvido.nivel] };
            puntos = puntosNoQuerido[cantoActual] || 1;
        } else {
            puntos = [1, 2, 3, 4][estadoTruco] || 1;
            if (manosGanadas.humano === manosGanadas.cpu) { // Cubre 1-1 y parda en 3ra, o 0-0 y pardas
                ganadorFinal = resultadosManos[0] === 'empate' ? manoDeLaRonda : resultadosManos[0];
            } else {
                ganadorFinal = manosGanadas.humano > manosGanadas.cpu ? 'humano' : 'cpu';
            }
        }
        marcador[ganadorFinal] += puntos;
        actualizarMarcador();
        const nombreGanador = (ganadorFinal === 'humano') ? jugadorHumano.nombre : jugadorCPU.nombre;
        actualizarInfo(`🏆 ¡${nombreGanador} gana la ronda y se lleva ${puntos} ${puntos > 1 ? 'puntos' : 'punto'}! 🏆`);
        setTimeout(() => {
            if (marcador.humano >= PUNTOS_PARA_GANAR) {
                actualizarInfo(`🎉 ¡FELICIDADES, ${jugadorHumano.nombre.toUpperCase()}, HAS GANADO LA PARTIDA! 🎉`);
                botones.nuevoJuego.style.display = 'inline-block';
            } else if (marcador.cpu >= PUNTOS_PARA_GANAR) {
                actualizarInfo(`Gana ${jugadorCPU.nombre}. ¡Mejor suerte la próxima!`);
                botones.nuevoJuego.style.display = 'inline-block';
            } else {
                iniciarPartida();
            }
        }, 3000);
    }
    function manejarCantoFlor() { if (!tieneFlor.humano) return; ocultarTodosLosControles(); tieneFlor.respondido = true; agregarAlLog(jugadorHumano.nombre, "¡FLOR!"); let mensaje = "¡FLOR! "; marcador.humano += 3; if (tieneFlor.cpu) { marcador.cpu += 3; mensaje += `${jugadorCPU.nombre} también tiene Flor. Son 3 puntos para cada uno.`; agregarAlLog(jugadorCPU.nombre, "¡FLOR!");} else { mensaje += `Son 3 puntos para ti.`; } actualizarInfo(mensaje); actualizarMarcador(); setTimeout(() => { if(marcador.humano < PUNTOS_PARA_GANAR && marcador.cpu < PUNTOS_PARA_GANAR) { prepararSiguienteMano(); } else { finalizarRonda(); } }, 2000); }
    function manejarCantoTruco(quienCanta) { if(quienCanta === 'humano') { ocultarTodosLosControles(true); cantoActual = 'truco'; estadoTruco = 1; agregarAlLog(jugadorHumano.nombre, "Truco"); actualizarInfo(`¡TRUCO! Esperando respuesta...`); setTimeout(() => decisionCPU('truco'), 1500); } }
    function manejarCantoEnvido(quienCanta, nivel) { if (quienCanta === 'humano') { estadoEnvido.nivel = nivel; cantoActual = 'envido'; ocultarTodosLosControles(); const nombres = {1: 'Envido', 2: 'Real Envido', 3: 'Falta Envido'}; agregarAlLog(jugadorHumano.nombre, nombres[nivel]); actualizarInfo(`¡${nombres[nivel].toUpperCase()}! Esperando respuesta...`); setTimeout(() => decisionCPU('envido'), 1500); } else { /* CPU Canta */ estadoEnvido.nivel = nivel; cantoActual = 'envido'; ocultarTodosLosControles(); const nombres = {1: 'Envido', 2: 'Real Envido', 3: 'Falta Envido'}; agregarAlLog(jugadorCPU.nombre, nombres[nivel]); actualizarInfo(`${jugadorCPU.nombre} canta: ¡${nombres[nivel].toUpperCase()}!`); mostrarBotonesRespuesta('humano', 'envido'); } }
    function manejarRespuesta(quienResponde, respuesta) { ocultarTodosLosControles(true); if (quienResponde === 'humano') { let canto = respuesta.replace(/-/g, ' '); canto = canto.charAt(0).toUpperCase() + canto.slice(1); agregarAlLog(jugadorHumano.nombre, canto); if (respuesta === 'quiero') { if (cantoActual === 'envido') { resolverEnvido(); } else { estadoTruco++; actualizarInfo(`¡QUIERO! La ronda vale ${[1,2,3,4][estadoTruco]} puntos.`); turnoDelHumano = (jugadorMano === 'humano'); dibujarMano(); if(!turnoDelHumano) setTimeout(jugarTurnoCPU, 1500); } } else if (respuesta === 'no-quiero') { agregarAlLog(jugadorHumano.nombre, "No Quiero"); finalizarRonda('cpu'); } else if (respuesta === 're-truco' || respuesta === 'vale-cuatro') { cantoActual = 'truco'; if(respuesta === 're-truco') estadoTruco = 2; if(respuesta === 'vale-cuatro') estadoTruco = 3; actualizarInfo(`¡${canto.toUpperCase()}! Esperando respuesta...`); setTimeout(() => decisionCPU('truco'), 1500); } } }
    function decisionCPU(tipoCanto) { if (tipoCanto === 'truco') { const mejorCartaCPU = jugadorCPU.mano.reduce((mejor, actual) => (actual.rankingTruco < mejor.rankingTruco) ? actual : mejor); if (mejorCartaCPU.rankingTruco <= 5 && estadoTruco < 3) { estadoTruco++; const canto = estadoTruco === 2 ? "Quiero Re-Truco" : "Quiero Vale Cuatro"; agregarAlLog(jugadorCPU.nombre, canto); actualizarInfo(`${jugadorCPU.nombre}: ¡${canto.toUpperCase()}!`); mostrarBotonesRespuesta('humano', 'truco'); } else if (mejorCartaCPU.rankingTruco <= 10) { estadoTruco++; agregarAlLog(jugadorCPU.nombre, "Quiero"); actualizarInfo(`${jugadorCPU.nombre}: ¡QUIERO!`); turnoDelHumano = (jugadorMano === 'humano'); dibujarMano(); if(!turnoDelHumano) setTimeout(jugarTurnoCPU, 1500); } else { agregarAlLog(jugadorCPU.nombre, "No Quiero"); actualizarInfo(`${jugadorCPU.nombre}: No quiero.`); finalizarRonda('humano'); } } else { const misPuntos = calcularEnvido(jugadorCPU.mano); if (misPuntos >= 30 && estadoEnvido.nivel < 3) { estadoEnvido.nivel++; const nombres = {1: 'Envido', 2: 'Real Envido', 3: 'Falta Envido'}; agregarAlLog(jugadorCPU.nombre, nombres[estadoEnvido.nivel]); actualizarInfo(`${jugadorCPU.nombre} canta: ¡${nombres[estadoEnvido.nivel].toUpperCase()}!`); mostrarBotonesRespuesta('humano', 'envido'); } else if (misPuntos >= 27) { agregarAlLog(jugadorCPU.nombre, "Quiero"); actualizarInfo(`${jugadorCPU.nombre}: ¡QUIERO!`); resolverEnvido(); } else { agregarAlLog(jugadorCPU.nombre, "No Quiero"); actualizarInfo(`${jugadorCPU.nombre}: No quiero.`); estadoEnvido.respondido = true; marcador.humano += estadoEnvido.nivel; actualizarMarcador(); setTimeout(() => { mostrarBotonesDeCantoInicial(); turnoDelHumano = (jugadorMano === 'humano'); dibujarMano(); if(!turnoDelHumano) prepararSiguienteMano(); }, 2000); } } }
    function resolverEnvido() { /* ... */ }
    function dibujarMano() { botones.mano.innerHTML = ''; jugadorHumano.mano.forEach(c => { const el = crearElementoCarta(c); el.disabled = !turnoDelHumano; el.onclick = () => jugarCarta(c); botones.mano.appendChild(el); }); }
    function dibujarManoCPU(inicial = false) { if(inicial) { botones.manoCPU.innerHTML = ''; for(let i = 0; i < 3; i++) { botones.manoCPU.appendChild(crearElementoCarta(null, true)); } } else { if(botones.manoCPU.firstChild) botones.manoCPU.removeChild(botones.manoCPU.firstChild); } }
    function crearElementoCarta(carta, esLomo = false) { if (esLomo) { const lomo = document.createElement('div'); lomo.className = 'carta'; lomo.innerHTML = SVG_LOMO_CARTA; return lomo; } const color = (carta.palo === 'oros' || carta.palo === 'copas') ? '#B71C1C' : 'black'; const svgCarta = `<svg viewbox="0 0 85 125" style="background-color: white; border: 2px solid black; border-radius: 8px; width: 100%; height: 100%;"><text x="5" y="18" font-size="16" font-weight="bold" fill="${color}">${carta.numero}</text><g transform="scale(0.8) translate(5, 5)">${SVG_ICONS[carta.palo]}</g><text x="42.5" y="118" font-size="9" text-anchor="middle" fill="#424242">${carta.palo.charAt(0).toUpperCase() + carta.palo.slice(1)}</text><text x="80" y="110" font-size="16" font-weight="bold" fill="${color}" transform="rotate(180, 42.5, 62.5)">${carta.numero}</text></svg>`; const el = document.createElement('div'); el.className = 'carta'; el.innerHTML = svgCarta; return el; }
    function actualizarInfo(m) { botones.info.innerHTML = m; }
    function actualizarMarcador() { botones.marcador.textContent = `${jugadorHumano.nombre}: ${marcador.humano} - ${jugadorCPU.nombre}: ${marcador.cpu}`; }
    function ocultarTodosLosControles(dejarTruco = false) { for (const key in botones) { if (!['marcador', 'info', 'mano', 'nuevoJuego', 'log', 'manoCPU'].includes(key)) { if(dejarTruco && key === 'truco' && estadoTruco < 1) continue; botones[key].style.display = 'none'; } } }
    function mostrarBotonesRespuesta(turno, tipoCanto) { if(turno === 'humano') { botones.quiero.style.display = 'inline-block'; botones.noQuiero.style.display = 'inline-block'; if (tipoCanto === 'truco') { if(estadoTruco < 2) botones.reTruco.style.display = 'inline-block'; if(estadoTruco < 3) botones.valeCuatro.style.display = 'inline-block'; } else { /* Lógica para mostrar respuestas al envido si fuera necesaria */ } } }
    function mostrarBotonesDeCantoInicial() { if(manoActual === 1 && !estadoEnvido.respondido) { if(tieneFlor.humano) { botones.flor.style.display = 'inline-block'; } else { botones.envido.style.display = 'inline-block'; botones.realEnvido.style.display = 'inline-block'; botones.faltaEnvido.style.display = 'inline-block';} } if(estadoTruco < 1) { botones.truco.style.display = 'inline-block'; } }
    
    // Relleno de funciones sin cambios para que el código sea completo.
    resolverEnvido = function() { estadoEnvido.respondido = true; const puntosH = calcularEnvido(jugadorHumano.mano); const puntosC = calcularEnvido(jugadorCPU.mano); const puntosMap = {1: 2, 2: 3, 3: PUNTOS_PARA_GANAR - Math.max(marcador.humano, marcador.cpu)}; const puntosEnDisputa = puntosMap[estadoEnvido.nivel] || 2; let ganadorEnvido, mensaje; if (puntosH >= puntosC) { ganadorEnvido = 'humano'; } else { ganadorEnvido = 'cpu'; } marcador[ganadorEnvido] += puntosEnDisputa; mensaje = `${ganadorEnvido === 'humano' ? 'Ganas' : 'Gana'} el envido con ${Math.max(puntosH, puntosC)} tantos.`; actualizarInfo(mensaje); agregarAlLog(jugadorHumano.nombre, `${puntosH} tantos.`); agregarAlLog(jugadorCPU.nombre, `${puntosC} tantos.`); actualizarMarcador(); setTimeout(() => { mostrarBotonesDeCantoInicial(); prepararSiguienteMano(); }, 2000); };
  </script>

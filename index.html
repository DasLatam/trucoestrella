<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrucoEstrella - El Truco Online</title>
    <link rel="icon" href="favicon.png" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen p-4 font-sans">

    <!-- Pantalla de inicio -->
    <div id="start-screen" class="bg-gray-800 p-8 rounded-lg shadow-2xl w-full max-w-lg mx-auto">
        <div class="flex items-center justify-center mb-6">
            <img src="favicon.png" alt="Logo TrucoEstrella" class="w-16 h-16 mr-2">
            <h1 class="text-3xl font-bold">TrucoEstrella</h1>
        </div>
        <div class="mb-4">
            <label class="block mb-2 font-semibold" for="playerName">Nombre:</label>
            <input id="playerName" type="text" class="w-full p-2 rounded text-black" maxlength="16" placeholder="Tu nombre">
        </div>
        <div class="mb-4 flex gap-4">
            <div>
                <label class="font-semibold">Puntos:</label>
                <select id="gamePoints" class="ml-2 p-1 rounded text-black">
                    <option value="15">15</option>
                    <option value="30" selected>30</option>
                </select>
            </div>
            <div>
                <label class="font-semibold" for="florRule">Jugar con Flor</label>
                <input id="florRule" type="checkbox" class="ml-2" />
            </div>
        </div>
        <div class="mb-4">
            <label class="font-semibold">Modo de juego:</label>
            <div class="flex flex-col gap-2 mt-2">
                <button id="btn-vs-ia" class="bg-blue-600 hover:bg-blue-700 text-white py-2 rounded">Retar a TrucoEstrella (1 vs IA)</button>
                <button class="bg-gray-600 text-white py-2 rounded opacity-50 cursor-not-allowed" disabled>Uno a Uno (Próximamente)</button>
                <button class="bg-gray-600 text-white py-2 rounded opacity-50 cursor-not-allowed" disabled>Dos a Dos (Próximamente)</button>
                <button class="bg-gray-600 text-white py-2 rounded opacity-50 cursor-not-allowed" disabled>Tres a Tres (Próximamente)</button>
            </div>
        </div>
        <button id="startGameBtn" class="bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-6 rounded-lg w-full text-xl shadow-lg transition duration-200">
            Comenzar Partida
        </button>
        <button id="clearCacheBtn" class="bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded-lg w-full mt-4 transition duration-200">
            Limpiar Cache
        </button>
        <hr class="my-6 border-gray-700">
        <div class="flex flex-col md:flex-row md:justify-between md:items-center text-sm text-gray-400 mt-4 gap-2">
            <span>Versión: <b>beta 2.0 gemini 2.5 PRO con deep research</b></span>
            <span>PC / Celular (próximamente)</span>
        </div>
    </div>

    <!-- Pantalla de juego -->
    <div id="game-screen" class="hidden w-full h-screen flex flex-col lg:flex-row bg-gray-900 text-white p-4 gap-4">
        <!-- Columna 1: Botonera de cantos -->
        <div class="flex flex-col gap-2 w-32">
            <button class="game-canto-btn bg-yellow-700 hover:bg-yellow-800 py-2 rounded" data-canto="Truco">Truco</button>
            <button class="game-canto-btn bg-yellow-700 hover:bg-yellow-800 py-2 rounded" data-canto="ReTruco">ReTruco</button>
            <button class="game-canto-btn bg-yellow-700 hover:bg-yellow-800 py-2 rounded" data-canto="Vale Cuatro">Vale Cuatro</button>
            <button class="game-canto-btn bg-blue-700 hover:bg-blue-800 py-2 rounded" data-canto="Envido">Envido</button>
            <button class="game-canto-btn bg-blue-700 hover:bg-blue-800 py-2 rounded" data-canto="Real Envido">Real Envido</button>
            <button class="game-canto-btn bg-blue-700 hover:bg-blue-800 py-2 rounded" data-canto="Falta Envido">Falta Envido</button>
            <button class="game-canto-btn bg-green-700 hover:bg-green-800 py-2 rounded" data-canto="Flor">Flor</button>
            <button class="game-canto-btn bg-green-700 hover:bg-green-800 py-2 rounded" data-canto="Contra Flor">Contra Flor</button>
            <button class="game-canto-btn bg-green-700 hover:bg-green-800 py-2 rounded" data-canto="Contra Flor al Resto">Contra Flor al Resto</button>
            <button id="btn-mazo" class="bg-red-700 hover:bg-red-800 py-2 rounded mt-4">Ir al Mazo</button>
            <button id="backToMenuBtn" class="bg-gray-700 hover:bg-gray-800 py-2 rounded mt-4">Volver al Menú</button>
        </div>
        <!-- Columna 2: Área de juego principal -->
        <div class="flex-1 flex flex-col items-center justify-between">
            <div id="ia-hand" class="flex justify-center gap-2 mb-4"></div>
            <div id="mesa" class="flex justify-center items-center gap-8 mb-4"></div>
            <div id="player-hand" class="flex justify-center gap-2 mt-4"></div>
        </div>
        <!-- Columna 3: Marcador de puntos -->
        <div class="flex flex-col w-48 items-center justify-between">
            <div id="canto-actual" class="h-12 flex items-center justify-center text-yellow-400 text-xl font-bold"></div>
            <div id="marcador" class="flex flex-col items-center justify-center"></div>
            <div id="canto-ia" class="h-12 flex items-center justify-center text-blue-400 text-xl font-bold"></div>
        </div>
        <!-- Columna 4: Historial -->
        <div class="flex flex-col w-80 bg-gray-800 rounded-lg shadow-lg p-2">
            <div class="font-bold text-center mb-2">Historial</div>
            <div id="historial" class="flex-1 overflow-y-auto h-64 text-sm select-text"></div>
        </div>
    </div>

    <!-- Popup de resultado de Envido/Flor -->
    <div id="popup-envido" class="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50 hidden">
        <div class="bg-white text-black rounded-lg shadow-xl p-8 text-center">
            <h2 class="text-2xl font-bold mb-4" id="popup-envido-title">Resultado Envido</h2>
            <div class="mb-2" id="popup-envido-content"></div>
        </div>
    </div>

    <!-- Modal de fin de partida -->
    <div id="modal-fin-partida" class="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50 hidden">
        <div class="bg-white text-black rounded-lg shadow-xl p-8 text-center">
            <h2 class="text-2xl font-bold mb-4">¡Fin de la partida!</h2>
            <div id="modal-fin-partida-content" class="mb-4"></div>
            <button id="btn-revancha" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-6 rounded-lg text-xl shadow-lg transition duration-200">Revancha</button>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>

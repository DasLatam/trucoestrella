<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gran Truco Argentino</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="pantalla-inicio" class="pantalla activa">
        <div class="modal-contenido">
            <h1>Gran Truco Argentino</h1>
            <form id="form-inicio">
                <div class="form-grupo">
                    <label for="nombre-jugador">Tu Nombre:</label>
                    <input type="text" id="nombre-jugador" placeholder="Jugador" maxlength="15">
                </div>
                <div class="form-grupo">
                    <p>Jugar a:</p>
                    <label><input type="radio" name="puntos" value="15"> 15 Puntos</label>
                    <label><input type="radio" name="puntos" value="30" checked> 30 Puntos</label>
                </div>
                <div class="form-grupo">
                    <label><input type="checkbox" id="con-flor"> Jugar con flor</label>
                </div>
                <button type="submit" class="btn-primario">Comenzar Partida</button>
                <button type="button" id="limpiar-cache" class="btn-secundario">Limpiar Cache y Recargar</button>
            </form>
        </div>
    </div>

    <div id="pantalla-juego" class="pantalla">
        <div id="canto-buttons" class="columna-lateral">
            <button data-canto="truco">Truco</button>
            <button data-canto="retruco" disabled>Retruco</button>
            <button data-canto="vale-cuatro" disabled>Vale Cuatro</button>
            <button data-canto="envido">Envido</button>
            <button data-canto="real-envido">Real Envido</button>
            <button data-canto="falta-envido">Falta Envido</button>
            <button data-canto="me-voy-al-mazo" class="btn-peligro">Ir al Mazo</button>
        </div>

        <div id="game-table-area">
            <div id="zona-ia" class="zona-jugador">
                <h2 id="nombre-ia-display">TrucoEstrella</h2>
                <div id="mano-ia" class="mano-container"></div>
            </div>
            <div id="mesa">
                <div id="mesa-ia" class="mesa-fila">
                    <div class="slot" data-ronda="1"></div>
                    <div class="slot" data-ronda="2"></div>
                    <div class="slot" data-ronda="3"></div>
                </div>
                <div id="mesa-jugador" class="mesa-fila">
                    <div class="slot" data-ronda="1"></div>
                    <div class="slot" data-ronda="2"></div>
                    <div class="slot" data-ronda="3"></div>
                </div>
            </div>
            <div id="zona-jugador" class="zona-jugador">
                <div id="mano-jugador" class="mano-container"></div>
                <h2 id="nombre-jugador-display">Jugador</h2>
            </div>
        </div>

        <div id="score-board" class="columna-lateral">
            <h3>Puntos</h3>
            <div class="marcador">
                <div class="marcador-equipo">
                    <h4>Nosotros</h4>
                    <div id="marcador-nosotros" class="porotos-container"></div>
                </div>
                <div class="marcador-equipo">
                    <h4>Ellos</h4>
                    <div id="marcador-ellos" class="porotos-container"></div>
                </div>
            </div>
            <button id="volver-menu" class="btn-secundario">Volver al Menú</button>
        </div>

        <div id="history-log" class="columna-lateral">
            <h3>Historial</h3>
            <div id="historial-partida"></div>
        </div>
    </div>

    <div id="modal-fin-partida" class="modal">
        <div class="modal-contenido">
            <h2 id="mensaje-ganador"></h2>
            <p id="puntaje-final"></p>
            <div class="modal-acciones">
                <button id="btn-revancha" class="btn-primario">Revancha</button>
                <button id="btn-menu-principal" class="btn-secundario">Menú Principal</button>
            </div>
        </div>
    </div>

    <script src="js/main.js" type="module"></script>
</body>
</html>

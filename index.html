<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TrucoEstrella</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main id="app">
    <section id="menu-inicial">
      <h1>🎴 TrucoEstrella</h1>

      <label>
        Nombre del jugador:
        <input type="text" id="nombre-jugador" maxlength="20" placeholder="Tu nombre" />
      </label>

      <fieldset>
        <legend>Puntos</legend>
        <label><input type="radio" name="puntos" value="15" checked /> 15 puntos</label>
        <label><input type="radio" name="puntos" value="30" /> 30 puntos</label>
      </fieldset>

      <label>
        <input type="checkbox" id="activar-flor" />
        Jugar con Flor
      </label>

      <button id="comenzar-btn">Comenzar Partida</button>
      <button id="limpiar-cache-btn">Limpiar Cache</button>
    </section>

    <section id="pantalla-juego" class="oculto">
      <!-- Juego en curso -->
      <div id="layout-juego">
        <!-- Columna 1: Botonera de Cantos -->
        <div id="columna-cantos">
          <button class="btn-canto" data-canto="truco">Truco</button>
          <button class="btn-canto" data-canto="envido">Envido</button>
          <button class="btn-canto" data-canto="quiero-ir-al-mazo">Ir al Mazo</button>
        </div>

        <!-- Columna 2: Área de Juego -->
        <div id="area-juego">
          <div id="mano-ia" class="mano ia"></div>
          <div id="mesa"></div>
          <div id="mano-jugador" class="mano jugador"></div>
        </div>

        <!-- Columna 3: Puntos -->
        <div id="columna-puntos">
          <div>
            <span id="nombre-jugador-marcador"></span>
            <div id="porotos-jugador" class="porotos"></div>
          </div>
          <hr />
          <div>
            <span>TrucoEstrella</span>
            <div id="porotos-ia" class="porotos"></div>
          </div>
        </div>

        <!-- Columna 4: Historial -->
        <div id="historial">
          <h3>Historial</h3>
          <div id="log" contenteditable="true"></div>
        </div>
      </div>

      <button id="volver-menu-btn" class="btn-secundario">Volver al Menú</button>
    </section>
  </main>

  <script type="module" src="js/main.js"></script>
</body>
</html>

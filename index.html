<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>TrucoEstrella</title>
  <style>
    body { font-family: sans-serif; background-color: #004d40; color: white; text-align: center; }
    .mesa { background-color: #00695c; border-radius: 10px; padding: 20px; margin: 20px auto; min-height: 150px; display: flex; justify-content: center; align-items: center; gap: 20px; }
    .mano-jugador { margin-top: 30px; }
    .carta {
      background-color: white;
      color: black;
      border: 2px solid black;
      border-radius: 8px;
      width: 80px;
      height: 120px;
      display: inline-flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 5px;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
    }
    .carta:hover { transform: scale(1.1); border-color: #ffab00; }
    .carta.palo-oros, .carta.palo-bastos { color: #b71c1c; }
    .carta.palo-espadas, .carta.palo-copas { color: black; }
    #info-juego { font-size: 1.2em; min-height: 30px; }
  </style>
</head>
<body>
  <h1>TrucoEstrella</h1>
  
  <div id="info-juego">¡Bienvenido!</div>

  <h2>Mesa</h2>
  <div class="mesa" id="mesa"></div>
  
  <h2>Tu Mano</h2>
  <div class="mano-jugador" id="mano-humano"></div>

  <script>
    // --- Definiciones Fundamentales (sin cambios) ---
    const PALOS = ['oros', 'copas', 'espadas', 'bastos'];
    const NUMEROS = [1, 2, 3, 4, 5, 6, 7, 10, 11, 12];
    const JERARQUIA_TRUCO = {
      '1-espadas': 1, '1-bastos': 2, '7-espadas': 3, '7-oros': 4,
      '3-espadas': 5, '3-oros': 5, '3-copas': 5, '3-bastos': 5,
      '2-espadas': 6, '2-oros': 6, '2-copas': 6, '2-bastos': 6,
      '1-oros': 7, '1-copas': 7,
      '12-espadas': 8, '12-oros': 8, '12-copas': 8, '12-bastos': 8,
      '11-espadas': 9, '11-oros': 9, '11-copas': 9, '11-bastos': 9,
      '10-espadas': 10, '10-oros': 10, '10-copas': 10, '10-bastos': 10,
      '7-copas': 11, '7-bastos': 11,
      '6-espadas': 12, '6-oros': 12, '6-copas': 12, '6-bastos': 12,
      '5-espadas': 13, '5-oros': 13, '5-copas': 13, '5-bastos': 13,
      '4-espadas': 14, '4-oros': 14, '4-copas': 14, '4-bastos': 14,
    };

    function crearBarajaTruco() {
      const baraja = [];
      for (const palo of PALOS) {
        for (const numero of NUMEROS) {
          baraja.push({
            numero: numero, palo: palo,
            valorEnvido: (numero >= 10) ? 0 : numero,
            rankingTruco: JERARQUIA_TRUCO[`${numero}-${palo}`],
            nombre: `${numero} de ${palo}`,
            id: `${numero}-${palo}`
          });
        }
      }
      return baraja;
    }
    function barajar(baraja) { for (let i = baraja.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1));[baraja[i], baraja[j]] = [baraja[j], baraja[i]]; } }
    function compararCartas(carta1, carta2) { if (carta1.rankingTruco < carta2.rankingTruco) return 'humano'; if (carta2.rankingTruco < carta1.rankingTruco) return 'cpu'; return 'empate'; }

    // --- NUEVO: Lógica del Juego Interactivo ---
    let jugadorHumano = { nombre: 'Jugador', mano: [] };
    let jugadorCPU = { nombre: 'Computadora', mano: [] };

    // Obtenemos los elementos del HTML para manipularlos
    const divManoHumano = document.getElementById('mano-humano');
    const divMesa = document.getElementById('mesa');
    const divInfoJuego = document.getElementById('info-juego');

    function iniciarJuego() {
      const baraja = crearBarajaTruco();
      barajar(baraja);

      jugadorHumano.mano = [];
      jugadorCPU.mano = [];
      
      for (let i = 0; i < 3; i++) {
        jugadorHumano.mano.push(baraja.pop());
        jugadorCPU.mano.push(baraja.pop());
      }
      
      divInfoJuego.textContent = "Tu turno. Elige una carta para jugar.";
      dibujarMano();
    }

    function dibujarMano() {
      divManoHumano.innerHTML = ''; // Limpiamos la mano anterior
      jugadorHumano.mano.forEach(carta => {
        const cartaHTML = document.createElement('button');
        cartaHTML.className = `carta palo-${carta.palo}`;
        cartaHTML.innerHTML = `<span>${carta.numero}</span><span>${carta.palo.slice(0,1).toUpperCase()}</span>`;
        
        // El evento clave: qué hacer cuando se hace clic en una carta
        cartaHTML.onclick = () => jugarCarta(carta);
        
        divManoHumano.appendChild(cartaHTML);
      });
    }
    
    function jugarCarta(cartaJugada) {
      // 1. Mover la carta del jugador a la mesa
      const cartaHumanoHTML = document.createElement('div');
      cartaHumanoHTML.className = `carta palo-${cartaJugada.palo}`;
      cartaHumanoHTML.innerHTML = `<span>${cartaJugada.numero}</span><span>${cartaJugada.palo.slice(0,1).toUpperCase()}</span>`;
      divMesa.appendChild(cartaHumanoHTML);

      // 2. Quitar la carta de la mano del jugador y volver a dibujar la mano
      jugadorHumano.mano = jugadorHumano.mano.filter(c => c.id !== cartaJugada.id);
      dibujarMano();
      
      // 3. Lógica simple de la CPU: juega su primera carta
      const cartaCPU = jugadorCPU.mano.shift();
      const cartaCPU_HTML = document.createElement('div');
      cartaCPU_HTML.className = `carta palo-${cartaCPU.palo}`;
      cartaCPU_HTML.innerHTML = `<span>${cartaCPU.numero}</span><span>${cartaCPU.palo.slice(0,1).toUpperCase()}</span>`;
      divMesa.appendChild(cartaCPU_HTML);

      // 4. Comparar y mostrar resultado
      const ganador = compararCartas(cartaJugada, cartaCPU);
      let mensaje = `Jugaste ${cartaJugada.nombre}. La CPU jugó ${cartaCPU.nombre}. `;
      if (ganador === 'humano') mensaje += "¡Ganaste la mano!";
      else if (ganador === 'cpu') mensaje += "La CPU gana la mano.";
      else mensaje += "¡Es parda!";
      
      divInfoJuego.textContent = mensaje;
      
      // Por ahora, la lógica se detiene aquí. En el futuro, continuaría la ronda.
    }

    // Iniciar el juego cuando carga la página
    iniciarJuego();

  </script>
</body>
</html>

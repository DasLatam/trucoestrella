<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>TrucoEstrella</title>
</head>
<body>
  <h1>Bienvenido a TrucoEstrella</h1>
  <p>El juego se está ejecutando. Abre la consola de desarrollador (F12) para ver la magia.</p>

  <script>
    // --- Definiciones Fundamentales del Juego de Truco ---

    // Los 4 palos de la baraja española.
    const PALOS = ['oros', 'copas', 'espadas', 'bastos'];

    // Los números de las cartas usadas en el truco.
    const NUMEROS = [1, 2, 3, 4, 5, 6, 7, 10, 11, 12];

    // Objeto que define la jerarquía de las cartas para el TRUCO.
    // Un número más bajo significa que la carta es MÁS poderosa.
    const JERARQUIA_TRUCO = {
      '1-espadas': 1,
      '1-bastos': 2,
      '7-espadas': 3,
      '7-oros': 4,
      '3-espadas': 5, '3-oros': 5, '3-copas': 5, '3-bastos': 5,
      '2-espadas': 6, '2-oros': 6, '2-copas': 6, '2-bastos': 6,
      '1-oros': 7, '1-copas': 7,
      '12-espadas': 8, '12-oros': 8, '12-copas': 8, '12-bastos': 8,
      '11-espadas': 9, '11-oros': 9, '11-copas': 9, '11-bastos': 9,
      '10-espadas': 10, '10-oros': 10, '10-copas': 10, '10-bastos': 10,
      '7-copas': 11, '7-bastos': 11,
      '6-espadas': 12, '6-oros': 12, '6-copas': 12, '6-bastos': 12,
      '5-espadas': 13, '5-oros': 13, '5-copas': 13, '5-bastos': 13,
      '4-espadas': 14, '4-oros': 14, '4-copas': 14, '4-bastos': 14,
    };

    /**
     * Crea una baraja completa de Truco Argentino (40 cartas).
     */
    function crearBarajaTruco() {
      const baraja = [];
      for (const palo of PALOS) {
        for (const numero of NUMEROS) {
          const carta = {
            numero: numero,
            palo: palo,
            valorEnvido: (numero >= 10) ? 0 : numero,
            rankingTruco: JERARQUIA_TRUCO[`${numero}-${palo}`]
          };
          baraja.push(carta);
        }
      }
      return baraja;
    }

    /**
     * Mezcla un array de cartas de forma aleatoria.
     */
    function barajar(baraja) {
      for (let i = baraja.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [baraja[i], baraja[j]] = [baraja[j], baraja[i]];
      }
    }

    // --- Ejemplo de Uso ---
    console.log("--- Cargando TrucoEstrella ---");
    const miBaraja = crearBarajaTruco();
    barajar(miBaraja);
    const manoJugador1 = miBaraja.slice(0, 3);
    console.log("Mano repartida para el Jugador 1:", manoJugador1);

  </script>
</body>
</html>

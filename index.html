<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrucoEstrella - El Truco Online</title>
    <link rel="icon" href="favicon.png" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen p-4 font-sans">

    <!-- Pantalla de inicio -->
    <div id="start-screen" class="bg-gray-800 p-8 rounded-lg shadow-2xl w-full max-w-2xl mx-auto">
        <div class="flex items-center justify-center mb-6">
            <img src="favicon.png" alt="Logo TrucoEstrella" class="w-16 h-16 mr-2">
            <h1 class="text-3xl font-bold">TrucoEstrella</h1>
        </div>
        <div class="mb-4">
            <label class="block mb-2 font-semibold" for="playerName">Nombre:</label>
            <input id="playerName" type="text" class="w-full p-2 rounded text-black" maxlength="16" placeholder="Jugador 1" value="Jugador 1">
        </div>
        <div class="mb-4 flex gap-4">
            <div>
                <label class="font-semibold">Puntos:</label>
                <select id="gamePoints" class="ml-2 p-1 rounded text-black">
                    <option value="15">15</option>
                    <option value="30" selected>30</option>
                </select>
            </div>
            <div>
                <label class="font-semibold" for="florRule">Jugar con Flor</label>
                <input id="florRule" type="checkbox" class="ml-2" />
            </div>
        </div>
        <div class="mb-4">
            <label class="font-semibold">Modo de juego:</label>
            <div class="flex flex-col gap-2 mt-2">
                <button id="btn-vs-ia" class="bg-blue-600 hover:bg-blue-700 text-white py-2 rounded">Retar a TrucoEstrella (1 vs IA)</button>
                <button class="bg-gray-600 text-white py-2 rounded opacity-50 cursor-not-allowed" disabled>Uno a Uno (Próximamente)</button>
                <button class="bg-gray-600 text-white py-2 rounded opacity-50 cursor-not-allowed" disabled>Dos a Dos (Próximamente)</button>
                <button class="bg-gray-600 text-white py-2 rounded opacity-50 cursor-not-allowed" disabled>Tres a Tres (Próximamente)</button>
            </div>
        </div>
        <button id="startGameBtn" class="bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-6 rounded-lg w-full text-xl shadow-lg transition duration-200">
            Comenzar Partido
        </button>
        <hr class="my-6 border-gray-700">
        <div class="flex flex-col md:flex-row md:justify-between md:items-center text-sm text-gray-400 mt-4 gap-2">
            <span>Versión: <b>Beta 3.1 Copilot</b></span>
            <span>PC / Celular (próximamente)</span>
        </div>
    </div>

    <!-- Pantalla de juego -->
    <div id="game-screen" class="hidden w-full h-screen flex flex-row bg-gray-900 text-white p-4 gap-4 overflow-x-auto">
        <!-- Columna 1: Botonera de cantos -->
        <div class="flex flex-col gap-2 w-44" id="cantos-col">
            <!-- Botones de canto generados dinámicamente -->
        </div>
        <!-- Columna 2: Área de juego principal (mesa apaisada) -->
        <div class="flex-1 flex flex-col items-center justify-center">
            <div id="mesa-paño" class="bg-green-900 rounded-2xl shadow-lg flex flex-col items-center justify-center p-4" style="min-width:600px;min-height:320px;">
                <div id="mesa-ia" class="flex flex-row justify-center gap-8 mb-4"></div>
                <div id="mesa-rondas" class="flex flex-row gap-8 items-center justify-center mb-4"></div>
                <div id="mesa-player" class="flex flex-row justify-center gap-8 mt-4"></div>
            </div>
        </div>
        <!-- Columna 3: Marcador de puntos -->
        <div class="flex flex-col w-56 items-center justify-between">
            <div id="canto-actual" class="h-12 flex items-center justify-center text-yellow-400 text-xl font-bold"></div>
            <div id="marcador" class="flex flex-col items-center justify-center text-3xl font-bold"></div>
            <div id="canto-ia" class="h-12 flex items-center justify-center text-blue-400 text-xl font-bold"></div>
        </div>
        <!-- Columna 4: Historial -->
        <div class="flex flex-col w-96 bg-gray-800 rounded-lg shadow-lg p-2">
            <div class="font-bold text-center mb-2">Historial</div>
            <div id="historial" class="flex-1 overflow-y-auto h-80 text-base select-text"></div>
        </div>
    </div>

    <!-- Popup de resultado de Envido/Flor -->
    <div id="popup-envido" class="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50 hidden">
        <div class="bg-white text-black rounded-lg shadow-xl p-8 text-center">
            <h2 class="text-2xl font-bold mb-4" id="popup-envido-title">Resultado</h2>
            <div class="mb-2" id="popup-envido-content"></div>
        </div>
    </div>

    <!-- Modal de fin de partido -->
    <div id="modal-fin-partida" class="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50 hidden">
        <div class="bg-white text-black rounded-lg shadow-xl p-8 text-center">
            <h2 class="text-2xl font-bold mb-4">¡Fin del partido!</h2>
            <div id="modal-fin-partida-content" class="mb-4"></div>
            <button id="btn-revancha" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-6 rounded-lg text-xl shadow-lg transition duration-200">Revancha</button>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
